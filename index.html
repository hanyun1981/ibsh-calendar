</head>
<body class="bg-white font-sans text-duo-text selection:bg-duo-green selection:text-white">
    
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, runTransaction, query, orderBy, limit, serverTimestamp, updateDoc, deleteField, writeBatch } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        window.fbModules = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut,
            getFirestore, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, runTransaction, query, orderBy, limit, serverTimestamp, updateDoc, deleteField, writeBatch
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>

    <script type="text/babel">
        // 🔧 FIX [效能]: 加入 useMemo & useCallback，避免每次 render 重新計算
        const { useState, useEffect, useMemo, useCallback } = React;

        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        // 🔧 偵測無法跑 Google OAuth 的環境：
        //  - file:// 直接開啟（本機雙擊）
        //  - about:srcdoc（被嵌在 iframe 裡，沒有正確的 origin）
        //  - data: URL
        // 這些環境下 Firebase Auth 的 popup / redirect 都會被 OAuth 拒絕（auth/unauthorized-domain），
        // 所以一律改走「Email 模擬登入」流程。
        const _proto = (typeof window !== 'undefined' && window.location && window.location.protocol) || '';
        const isPreviewEnv = ['file:', 'about:', 'data:'].includes(_proto);
        const useEmailOnlyLogin = isCanvasEnv || isPreviewEnv;
        const defaultFirebaseConfig = {
            apiKey: "AIzaSyAFXr6AfSXf97k2uckNDrH5vXflhO8VD-s",
            authDomain: "venus-reservation.firebaseapp.com",
            projectId: "venus-reservation",
            storageBucket: "venus-reservation.firebasestorage.app",
            messagingSenderId: "1067791969461",
            appId: "1:1067791969461:web:c4f9760ce9680d4158e2fc",
            measurementId: "G-NG16S5D021"
        };

        // 🔧 Google Apps Script 設定
        // 部署 GAS Web App 後，請填入下方兩個欄位：
        // 1. WEB_APP_URL - 部署後拿到的 https://script.google.com/macros/s/.../exec 連結
        // 2. APP_URL     - index.html 對外公開的網址；email 一鍵審核按鈕會連到這裡
        // 3. API_SECRET  - 必須與 GAS 程式碼中的 CONFIG.API_SECRET 完全一致
        const GAS_CONFIG = {
            WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbw8A5lvt-GkIbxKpIS_kOTNdC1A9po0rSezlyv3ym3Ux6kjHl95zDcfHFgyoTNDymPR9Q/exec',
            APP_URL: 'https://hanyun1981.github.io/Venue-Reservation/',
            API_SECRET: 'sport-venue-2026-XYZabc!@#'
        };
        const SUPER_ADMIN_EMAIL = 'hanyun@ibsh.tw';

        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cartreserver-app';

        const initialData = {
            "活動中心":         { type: "綜合場地",     location: "活動中心", capacity: 200, schedule: {}, notes: "可進行球類、舞蹈、集會等活動", order: 0, managerEmails: ["gao@nehs.hc.edu.tw"],    registrantEmails: [] },
            "重量訓練室":       { type: "重訓室",       location: "學餐對面", capacity: 20,  schedule: {}, notes: "使用前請先閱讀器材安全須知",   order: 1, managerEmails: ["hanyun@nehs.hc.edu.tw"], registrantEmails: [] },
            "地下多功能訓練室": { type: "多功能訓練室", location: "地下室",   capacity: 30,  schedule: {},                                          order: 2, managerEmails: ["hanyun@nehs.hc.edu.tw"], registrantEmails: [] },
        };

        const initialUsers = {
            "gao@nehs.hc.edu.tw":    { name: "Gao",     email: "gao@nehs.hc.edu.tw",    defaultClass: "中學部體育", customClass: "", role: "venue_manager" },
            "hanyun@nehs.hc.edu.tw": { name: "Han Yun", email: "hanyun@nehs.hc.edu.tw", defaultClass: "中學部體育", customClass: "", role: "venue_manager" }
        };

        // 預設場地審核者對應表（自動套用用）
        // 把場地名稱對應到「該場地的審核者 email 陣列」
        const DEFAULT_VENUE_MANAGERS = {
            "活動中心":         ["gao@nehs.hc.edu.tw"],
            "重量訓練室":       ["hanyun@nehs.hc.edu.tw"],
            "地下多功能訓練室": ["hanyun@nehs.hc.edu.tw"]
        };

        // 角色定義
        const ROLE_OPTIONS = [
            { value: 'user', label: '一般使用者', color: 'gray', desc: '基本帳號' },
            { value: 'venue_registrant', label: '場地登記者', color: 'green', desc: '可登記/預約被指派的場地' },
            { value: 'venue_manager', label: '場地審核者', color: 'blue', desc: '可審核被指派的場地' },
            { value: 'super_admin', label: '超級管理員', color: 'yellow', desc: '完整管理權限' }
        ];
        const ROLE_LABEL = {
            'super_admin': '超級管理員',
            'venue_manager': '場地審核者',
            'venue_registrant': '場地登記者',
            'user': '一般使用者'
        };

        const periods = [
            { id: 1, time: "8:10-9:00", name: "Period 1" }, { id: 2, time: "9:10-10:00", name: "Period 2" },
            { id: 3, time: "10:10-11:00", name: "Period 3" }, { id: 4, time: "11:10-12:00", name: "Period 4" },
            // 午餐時段也開放預約（id 改為一般字串 'L'，讓所有 lunch 特例都不會生效）
            { id: "L", time: "12:00-13:00", name: "Lunch Time" },
            { id: 5, time: "13:10-14:00", name: "Period 5" }, { id: 6, time: "14:10-15:00", name: "Period 6" },
            { id: 7, time: "15:20-16:10", name: "Period 7" }, { id: 8, time: "16:20-17:10", name: "Period 8" }
        ];

        const baseDays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        const ACTIVITY_CENTER_NAME = "活動中心";
        const activityCenterAreas = [
            { id: 'stage', label: '舞台' },
            { id: 'court', label: '球場' }
        ];
        // 預約／登記表單的 Class/Dept 選項（按學校單位）
        const classOptions = [
            "中學部體育",
            "中學部活動",
            "雙語部體育",
            "雙語部活動",
            "國小部體育",
            "國小部活動",
            "總務處",
            "Other (Specify)"
        ];

        const getTimestamp = () => new Date().toLocaleString('en-US', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        const isActivityCenter = (cartName) => cartName === ACTIVITY_CENTER_NAME;
        const getVenueAreas = (cartName) => isActivityCenter(cartName) ? activityCenterAreas : [{ id: 'main', label: '' }];
        const getSlotAreaLabel = (areaId) => (activityCenterAreas.find(a => a.id === areaId)?.label || '');
        const buildSlotId = (week, dayIdx, periodId, areaId = 'main') => {
            const base = `w${week}_d${dayIdx}_p${periodId}`;
            return areaId && areaId !== 'main' ? `${base}~${areaId}` : base;
        };
        const getBaseSlotId = (slotId) => String(slotId || '').split('~')[0];
        const parseSlotId = (slotId) => {
            const [base, areaId = 'main'] = String(slotId || '').split('~');
            const match = base.match(/^w(\d+)_d(\d+)_p(.+)$/);
            if (!match) return null;
            return {
                week: parseInt(match[1]),
                dayIdx: parseInt(match[2]),
                periodId: match[3],
                areaId,
                areaLabel: getSlotAreaLabel(areaId)
            };
        };

        function App() {
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [dbRefs, setDbRefs] = useState(null);
            
            const [alertModal, setAlertModal] = useState({ isOpen: false, message: '' });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });

            const showAlert = (message) => setAlertModal({ isOpen: true, message });
            const showConfirm = (message, onConfirm) => setConfirmModal({ isOpen: true, message, onConfirm });

            const [currentView, setCurrentView] = useState('home');
            const [viewHistory, setViewHistory] = useState(['home']);
            const [activeFilter, setActiveFilter] = useState('All');
            const [activeLocationFilter, setActiveLocationFilter] = useState('All'); 
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCart, setSelectedCart] = useState(null);
            const [adminTab, setAdminTab] = useState('carts');
            
            const [semesterConfig, setSemesterConfig] = useState({ startDate: '2026-02-23', totalWeeks: 19, maxAdvanceWeeks: 2 });
            const [tempSemesterConfig, setTempSemesterConfig] = useState({ ...semesterConfig });
            const [emailConfig, setEmailConfig] = useState({
                webAppUrl: GAS_CONFIG.WEB_APP_URL,
                appUrl: GAS_CONFIG.APP_URL
            });
            const [tempEmailConfig, setTempEmailConfig] = useState({
                webAppUrl: GAS_CONFIG.WEB_APP_URL,
                appUrl: GAS_CONFIG.APP_URL
            });

            const [currentRealWeek, setCurrentRealWeek] = useState(1);
            const [allowSaturday, setAllowSaturday] = useState(true);
            // 改用「年月日」選擇器：selectedDate 是 source of truth，
            // selectedWeek / selectedDayIdx 由 selectedDate 推算（見下方 useMemo）
            const [selectedDate, setSelectedDate] = useState(() => {
                const t = new Date();
                return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
            });
            // 一週開放週一到週日（共 7 天），不再使用 Saturday toggle
            const currentDays = baseDays;

            const [cartData, setCartData] = useState({});
            const [usersDB, setUsersDB] = useState({}); 
            const [activityLogs, setActivityLogs] = useState([]); 
            
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [authMode, setAuthMode] = useState('login');
            
            const [adminAddUserModal, setAdminAddUserModal] = useState({ isOpen: false });
            const [addUserForm, setAddUserForm] = useState({ name: '', email: '', classType: '中學部體育', customClass: '', role: 'user' });

            const [bookingModal, setBookingModal] = useState({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false, isPast: false });
            const [bookForm, setBookForm] = useState({ classType: '', customClass: '' });
            const [editBookForm, setEditBookForm] = useState({ name: '', email: '', classType: '', customClass: '' });
            const [editCartModal, setEditCartModal] = useState({ isOpen: false, cartName: null, data: null });
            // 編輯場地時暫存被選為「場地審核者」的 email 陣列
            const [editCartManagers, setEditCartManagers] = useState([]);
            // 編輯場地時暫存被選為「場地登記者」的 email 陣列
            const [editCartRegistrants, setEditCartRegistrants] = useState([]);
            const [printSelection, setPrintSelection] = useState([]);

            const [recurringLocks, setRecurringLocks] = useState([]);
            const [lockModal, setLockModal] = useState({ isOpen: false, lockId: null, data: null });

            const [isBatchMode, setIsBatchMode] = useState(false);
            const [batchSelection, setBatchSelection] = useState([]);
            const [myBookingsView, setMyBookingsView] = useState('list');
            const [myBookingsTab, setMyBookingsTab] = useState('upcoming');
            const [myBookingsStatusTab, setMyBookingsStatusTab] = useState('all');

            const changeView = (newView) => {
                if (newView === currentView) return;
                setViewHistory(prev => [...prev, newView]);
                setCurrentView(newView);
            };

            const goBack = () => {
                if (viewHistory.length > 1) {
                    const newHistory = [...viewHistory];
                    newHistory.pop();
                    setViewHistory(newHistory);
                    setCurrentView(newHistory[newHistory.length - 1]);
                } else {
                    setCurrentView('home');
                }
            };

            const goHome = () => {
                setViewHistory(['home']);
                setCurrentView('home');
            };

            // 🔧 FIX [安全]: 移除 signInAnonymously，改為僅 Google 登入
        // 原本每個訪客都會建立匿名帳號，導致 Firebase Auth 充滿無用帳號，
        // 且匿名帳號也能通過 rules 的 isAuthenticated() 讀寫資料。
        // 現在改為：頁面載入 → 顯示登入畫面 → Google 登入後才能存取 Firestore。
        // onAuthStateChanged 負責在頁面重新整理時自動恢復 Google session。
        useEffect(() => {
                const initFirebase = async () => {
                    const fb = window.fbModules;
                    const app = fb.initializeApp(firebaseConfig);
                    const auth = fb.getAuth(app);
                    const db = fb.getFirestore(app);

                    const getCol = (colName) => isCanvasEnv
                        ? fb.collection(db, 'artifacts', appId, 'public', 'data', colName)
                        : fb.collection(db, colName);

                    const getDocRef = (colName, docId) => isCanvasEnv
                        ? fb.doc(db, 'artifacts', appId, 'public', 'data', colName, String(docId))
                        : fb.doc(db, colName, String(docId));

                    const refs = { getCol, getDocRef, db, auth, fb };
                    setDbRefs(refs);

                    // Canvas 環境使用 Custom Token
                    if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } catch (e) {
                            console.error("Auth Error:", e);
                            setFirebaseReady('auth-error');
                            return;
                        }
                    }

                    // 🔧 處理 signInWithRedirect 回來的結果（fallback 流程用）
                    // 若沒走過 redirect 流程，這裡會回傳 null，不會出錯。
                    try {
                        await fb.getRedirectResult(auth);
                    } catch (e) {
                        console.error("Redirect result error:", e);
                    }

                    // 監聽 Auth 狀態：處理頁面重整時的 session 恢復
                    fb.onAuthStateChanged(auth, async (user) => {
                        if (user && user.email) {
                            // 已有 Google session，自動恢復登入狀態
                            // 硬編碼的 SUPER_ADMIN_EMAIL 永遠是超級管理員（即使資料庫沒有此帳號）
                            if ((user.email || '').trim().toLowerCase() === SUPER_ADMIN_EMAIL.toLowerCase()) {
                                setIsAdmin(true);
                                setCurrentUser({ name: 'System Admin', email: SUPER_ADMIN_EMAIL, defaultClass: 'Admin', customClass: '', role: 'super_admin' });
                            } else {
                                try {
                                    const userDocRef = refs.getDocRef('users', user.email);
                                    const userDoc = await refs.fb.getDoc(userDocRef);
                                    if (userDoc.exists()) {
                                        const udata = userDoc.data();
                                        setCurrentUser(udata);
                                        // role === 'super_admin' 也視為 isAdmin
                                        setIsAdmin(udata.role === 'super_admin');
                                    } else {
                                        // 白名單中沒有此帳號，登出
                                        await fb.signOut(auth);
                                    }
                                } catch (e) {
                                    console.error("Session restore error:", e);
                                }
                            }
                        }
                        // 不管有沒有 session，都設為 ready（讓登入畫面能顯示）
                        setFirebaseReady(true);
                    });
                };

                if (window.fbModules) initFirebase();
                else window.addEventListener('firebaseLoaded', initFirebase);
            }, []);

            // 🔧 FIX [安全]: Cart & Settings 訂閱改為「登入後才啟動」
            // 原本匿名用戶就能觸發 onSnapshot 讀取所有推車資料。
            // 現在加上 currentUser || isAdmin 條件，確保只有通過 Google 登入的用戶才會訂閱。
            useEffect(() => {
                if (!firebaseReady || firebaseReady === 'auth-error' || !dbRefs) return;
                if (!currentUser && !isAdmin) return;

                const unsubCarts = dbRefs.fb.onSnapshot(dbRefs.getCol('carts'), (snap) => {
                    const newCarts = {};
                    snap.forEach(d => { newCarts[d.id] = d.data(); });
                    if (newCarts["重量訓練室"]) {
                        newCarts["重量訓練室"] = { ...newCarts["重量訓練室"], location: "學餐對面" };
                    }

                    // 永遠先把 Firestore 拿到的資料寫進 state（不論空不空）
                    setCartData(newCarts);

                    // 若 Firestore 是空的、且還沒嘗試過種子化，就嘗試寫入預設 3 個場地
                    if (snap.empty && !window.__seededCarts) {
                        window.__seededCarts = true;
                        Object.entries(initialData).forEach(([k, v]) =>
                            dbRefs.fb.setDoc(dbRefs.getDocRef('carts', k), v).catch(e => {
                                console.warn("Seed cart failed (Firestore rules?):", k, e);
                            })
                        );
                    }
                }, err => console.error("Firestore Error:", err));

                const unsubSettings = dbRefs.fb.onSnapshot(dbRefs.getDocRef('settings', 'main'), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.semesterConfig) {
                            setSemesterConfig({ ...data.semesterConfig, maxAdvanceWeeks: data.semesterConfig.maxAdvanceWeeks || 2 });
                            setTempSemesterConfig({ ...data.semesterConfig, maxAdvanceWeeks: data.semesterConfig.maxAdvanceWeeks || 2 });
                        }
                        if (data.allowSaturday !== undefined) setAllowSaturday(data.allowSaturday);
                        if (data.emailConfig) {
                            const nextEmailConfig = {
                                webAppUrl: data.emailConfig.webAppUrl || GAS_CONFIG.WEB_APP_URL,
                                appUrl: data.emailConfig.appUrl || GAS_CONFIG.APP_URL
                            };
                            setEmailConfig(nextEmailConfig);
                            setTempEmailConfig(nextEmailConfig);
                        }
                        setRecurringLocks(Array.isArray(data.recurringLocks) ? data.recurringLocks : []);
                    } else {
                        dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), {
                            semesterConfig: { startDate: '2026-02-23', totalWeeks: 19, maxAdvanceWeeks: 2 },
                            emailConfig: {
                                webAppUrl: GAS_CONFIG.WEB_APP_URL,
                                appUrl: GAS_CONFIG.APP_URL
                            },
                            allowSaturday: false
                        }).catch(e => {});
                    }
                }, err => console.error("Firestore Error:", err));

                return () => { unsubCarts(); unsubSettings(); };
            }, [firebaseReady, dbRefs, currentUser, isAdmin]);

            // Users 訂閱：所有已登入使用者都訂閱
            // 場地管理員、一般使用者也需要 users 資料，才能顯示「審核者姓名」、寄信時帶上申請人姓名等。
            // 安全性：請在 Firestore Rules 限制只有登入者能讀，且 role 欄位只有 super_admin 可寫。
            useEffect(() => {
                if (!dbRefs || (!currentUser && !isAdmin)) return;

                const unsubUsers = dbRefs.fb.onSnapshot(dbRefs.getCol('users'), (snap) => {
                    const newUsers = {};
                    snap.forEach(d => { newUsers[d.id] = d.data(); });

                    if (snap.empty && !window.__seededUsers && isAdmin) {
                        window.__seededUsers = true;
                        Object.entries(initialUsers).forEach(([k, v]) => dbRefs.fb.setDoc(dbRefs.getDocRef('users', k), v).catch(e => {}));
                    } else {
                        setUsersDB(newUsers);
                    }
                });

                return () => { unsubUsers(); };
            }, [dbRefs, isAdmin, currentUser]);

            useEffect(() => {

            useEffect(() => {

                    const now = new Date();

                    const start = new Date(year, month - 1, day);
                    start.setHours(0, 0, 0, 0);
                    now.setHours(0, 0, 0, 0);

                    const diffTime = now.getTime() - start.getTime();
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    let currentWeekCalc = Math.floor(diffDays / 7) + 1;

                    if (currentWeekCalc < 1) currentWeekCalc = 1;

            // 原本每次 render（包含與預約無關的 UI 操作如開關 modal）都重新跑
            // 排序/過濾/我的預約計算。現在只在依賴資料真正變更時才重算。
            // =================================================================

            const sortedAllCarts = useMemo(() => {

                const [sy, sm, sd] = semesterConfig.startDate.split('-').map(Number);
                const start = new Date(sy, sm - 1, sd);
                date.setHours(0, 0, 0, 0);
                start.setHours(0, 0, 0, 0);
                const diffDays = Math.floor((date.getTime() - start.getTime()) / 86400000);
                let w = Math.floor(diffDays / 7) + 1;
                if (w < 1) w = 1;
                if (w > semesterConfig.totalWeeks) w = semesterConfig.totalWeeks;
                return w;

                else if (direction === 'down' && idx < sortedNames.length - 1) [sortedNames[idx + 1], sortedNames[idx]] = [sortedNames[idx], sortedNames[idx + 1]];
                else return;
                
                try {
                    const batch = dbRefs.fb.writeBatch(dbRefs.db);

            // 本機 / 預覽登入：跳出 prompt 讓使用者輸入白名單 email
            const handleEmailLogin = async () => {
                const inputEmail = prompt(`【白名單登入】\n\n請輸入已加入白名單的 Email：\n(最高權限管理員請輸入 ${SUPER_ADMIN_EMAIL})`, '');
                if (inputEmail) await loginWithEmail(inputEmail);
            };

            // 🔧 FIX [安全]: Google 登入流程
            // signInWithPopup 成功後，onAuthStateChanged 會自動觸發 session 恢復。
            // 對無法跑 OAuth 的環境（Canvas / file://）改走 email 流程。
            // 對 popup 失敗的情況自動 fallback 到 redirect，並針對常見錯誤碼給出明確提示。
            const handleGoogleLogin = async () => {
                // 環境不支援 OAuth → 直接走 email 流程
                if (useEmailOnlyLogin) {
                    return handleEmailLogin();
                }

                try {
                    const provider = new dbRefs.fb.GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    const result = await dbRefs.fb.signInWithPopup(dbRefs.auth, provider);
                    const userEmail = result.user.email;

                    // onAuthStateChanged 會自動處理 session 恢復，
                    // 但如果白名單中沒有此帳號，需要立即登出並顯示錯誤。
                    if ((userEmail || '').trim().toLowerCase() !== SUPER_ADMIN_EMAIL.toLowerCase()) {
                        const userDocRef = dbRefs.getDocRef('users', userEmail);
                        const userDoc = await dbRefs.fb.getDoc(userDocRef);
                        if (!userDoc.exists()) {
                            await dbRefs.fb.signOut(dbRefs.auth);
                            setCurrentUser(null);
                            setIsAdmin(false);
                            showAlert(`Access Denied.\n你的 Email（${userEmail}）不在白名單中。\n請聯絡系統管理員加入後再登入。`);
                        }
                    }
                    // 如果驗證通過，onAuthStateChanged 已經設好 currentUser & isAdmin
                } catch (error) {
                    console.error("Google login error:", error);
                    const code = error?.code || '';

                    if (code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') {
                        return; // 使用者主動取消，不顯示錯誤
                    }

                    // popup 被擋 → 自動嘗試 redirect 流程
                    if (code === 'auth/popup-blocked') {
                        try {
                            const provider = new dbRefs.fb.GoogleAuthProvider();
                            provider.setCustomParameters({ prompt: 'select_account' });
                            await dbRefs.fb.signInWithRedirect(dbRefs.auth, provider);
                            return;
                        } catch (redirectErr) {
                            console.error("Redirect fallback failed:", redirectErr);
                        }
                    }

                    // 針對常見錯誤碼給出明確中文提示
                    let msg;
                    switch (code) {
                        case 'auth/unauthorized-domain':
                            msg = `❌ 未授權的網域\n\n目前網址（${window.location.origin}）尚未加入 Firebase 允許清單。\n\n修正方式：\n1. 前往 Firebase Console → Authentication → Settings → Authorized domains\n2. 加入此網域\n\n如果你只是要本機測試，請重新按登入按鈕並輸入白名單帳號。`;
                            break;
                        case 'auth/operation-not-allowed':
                            msg = `❌ Google 登入未啟用\n\n請到 Firebase Console → Authentication → Sign-in method 啟用 Google provider。`;
                            break;
                        case 'auth/network-request-failed':
                            msg = `❌ 網路連線失敗\n\n請檢查你的網路後再試。`;
                            break;
                        case 'auth/popup-blocked':
                            msg = `❌ 瀏覽器擋下了 Google 登入彈窗\n\n請允許此網站的彈窗後再試。`;
                            break;
                        case 'auth/internal-error':
                            msg = `❌ Firebase 內部錯誤\n\n可能是 Auth 設定不完整，請檢查 Firebase Console 設定。`;
                            break;
                        default:
                            msg = `❌ Google 登入失敗\n\n錯誤代碼：${code || 'unknown'}\n${error.message || ''}`;
                    }
                    showAlert(msg);
                }
            };

            const getLockForSlot = (cartName, week, dayIdx, periodId) => {

            const saveLock = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const lockData = {
                    id: lockModal.lockId || `lock_${Date.now()}_${Math.random().toString(36).substring(2, 7)}`,
                    name: formData.get('name').trim() || 'Locked',
                    cartName: formData.get('cartName'),
                    dayIdx: Number(formData.get('dayIdx')),
                    periodId: formData.get('periodId'),
                    startWeek: Number(formData.get('startWeek')),
                    weeks: Number(formData.get('weeks'))
                };

                if (!lockData.cartName) { showAlert("請選擇一個 Cart。"); return; }
                if (lockData.weeks < 1) { showAlert("持續週數必須至少 1 週。"); return; }

                try {
                    const newLocks = lockModal.lockId
                        ? recurringLocks.map(l => l.id === lockModal.lockId ? lockData : l)
