                    await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { recurringLocks: newLocks }, { merge: true });

                    const cartRef = dbRefs.getDocRef('carts', lockData.cartName);
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) return;
                        const schedule = cartDoc.data().schedule || {};
                        let changed = false;
                        for (let w = lockData.startWeek; w < lockData.startWeek + lockData.weeks; w++) {
                            const baseSlotId = buildSlotId(w, lockData.dayIdx, lockData.periodId);
                            Object.keys(schedule).forEach(slotId => {
                                if (getBaseSlotId(slotId) === baseSlotId) {
                                    delete schedule[slotId];
                                    changed = true;
                                }
                            });
                        }
                        if (changed) transaction.update(cartRef, { schedule });
                    });

                    addLog(lockModal.lockId ? "Edit Lock" : "Add Lock", lockData.cartName, `${lockData.name} · Wk${lockData.startWeek}-${lockData.startWeek + lockData.weeks - 1} · ${currentDays[lockData.dayIdx] || `Day${lockData.dayIdx}`} P${lockData.periodId}`);
                    setLockModal({ isOpen: false, lockId: null, data: null });
                } catch (err) {
                    console.error("Save lock error:", err);
                    showAlert("儲存鎖定失敗，請稍後再試。");
                }
            };

            const deleteLock = (lockId) => {
                const lock = recurringLocks.find(l => l.id === lockId);
                if (!lock) return;
                showConfirm(`確定要刪除鎖定「${lock.name}」嗎？`, async () => {
                    try {
                        const newLocks = recurringLocks.filter(l => l.id !== lockId);
                        await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { recurringLocks: newLocks }, { merge: true });
                        addLog("Delete Lock", lock.cartName, `${lock.name} · Wk${lock.startWeek}-${lock.startWeek + lock.weeks - 1}`);
                    } catch (err) {
                        console.error("Delete lock error:", err);
                        showAlert("刪除鎖定失敗，請稍後再試。");
                    }
                });
            };

            const deleteUser = (email) => {
                showConfirm(`Delete user ${usersDB[email].name} from whitelist?\nThey will no longer be able to log in.`, async () => {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('users', email));
                    addLog("Delete User", "System", `Admin removed account from whitelist: ${email}`);
                });
            };

            const todayDay = new Date().getDay();
            const currentRealDayIdx = todayDay === 0 ? 6 : todayDay - 1;

            // 🔧 通用 GAS Web App 呼叫函式
            // 所有寄信功能都走這個。
            // showErrors=true 時若失敗會跳 alert 視窗（測試用、後台動作用 false 才不會打斷使用者）。
            //
            // ⚠️ GAS Web App 的 fetch 必須用 'text/plain' Content-Type 才能跳過 CORS preflight。
            // GAS 端會自己 parse JSON。
            const callGAS = useCallback(async (action, extraData, showErrors = false) => {
                const webAppUrl = (emailConfig.webAppUrl || GAS_CONFIG.WEB_APP_URL || '').trim();
                if (!webAppUrl || webAppUrl === 'YOUR_WEB_APP_URL') {
                    const msg = "GAS Web App URL 未設定，跳過寄信。";
                    console.warn(msg, action);
                    if (showErrors) showAlert(`📧 ${msg}`);
                    return { ok: false, error: msg };
                }
                const payload = {
                    secret: GAS_CONFIG.API_SECRET,
                    action,
                    ...extraData
                };
                try {
                    const res = await fetch(webAppUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload),
                        redirect: 'follow'
                    });
                    const text = await res.text();

                    // GAS 失敗時可能回傳 HTML（例如未授權、未公開、被擋），先嘗試解析 JSON
                    let result;
                    try {
                        result = JSON.parse(text);
                    } catch (parseErr) {
                        console.error(`GAS [${action}] returned non-JSON:`, text.slice(0, 800));
                        const reason = text.includes('Authorization')
                            ? '⚠️ GAS 尚未授權使用 Gmail。請到 GAS 編輯器執行一次 sendTestEmail() 完成授權。'
                            : text.includes('Sign in')
                                ? '⚠️ Web App 部署的「存取權」沒設成「任何人」，請重新部署並選「任何人」。'
                                : `⚠️ GAS 回應不是 JSON，可能是 Web App 設定錯誤或部署失敗。\n\n回應前 200 字：\n${text.slice(0, 200)}`;
                        if (showErrors) showAlert(`📧 寄信失敗\n\n${reason}`);
                        return { ok: false, error: reason };
                    }

                    if (!result.ok) {
                        console.error(`GAS [${action}] error:`, result.error);
                        if (showErrors) showAlert(`📧 寄信失敗（GAS 回報）：${result.error || '未知錯誤'}`);
                    }
                    return result;
                } catch (err) {
                    const msg = `📧 寄信失敗：無法連線到 GAS Web App\n\n${err.message || err}\n\n請確認：\n• WEB_APP_URL 是否正確（要以 /exec 結尾）\n• GAS 部署的「存取權」是否設成「任何人」\n• 部署後是否「儲存新版本」`;
                    console.error(`GAS [${action}] fetch failed:`, err);
                    if (showErrors) showAlert(msg);
                    return { ok: false, error: String(err) };
                }
            }, [showAlert, emailConfig]);

            // 🔧 手動套用預設權限（按鈕觸發版，逐筆顯示結果）
            // 自動 effect 跑過會被 window.__defaultPermsApplied 鎖住，
            // 這個函式會強制重新跑一次，並把每筆操作結果明確列出來給管理員確認。
            const handleApplyDefaultPermissions = async () => {
                if (!isAdmin) {
                    showAlert("只有超級管理員可以執行此操作。");
                    return;
                }
                if (!dbRefs) {
                    showAlert("Firebase 尚未就緒。");
                    return;
                }

                const report = {
                    usersAdded: [], usersExist: [], usersFailed: [],
                    cartsUpdated: [], cartsSkipped: [], cartsMissing: [], cartsFailed: []
                };

                // 1. 補預設使用者
                for (const [email, userData] of Object.entries(initialUsers)) {
                    try {
                        const ref = dbRefs.getDocRef('users', email);
                        const doc = await dbRefs.fb.getDoc(ref);
                        if (!doc.exists()) {
                            await dbRefs.fb.setDoc(ref, userData);
                            report.usersAdded.push(email);
                        } else {
                            report.usersExist.push(email);
                        }
                    } catch (err) {
                        console.error('套用使用者失敗', email, err);
                        report.usersFailed.push(`${email}（${err.message || err}）`);
                    }
                }

                // 2. 補預設場地審核者
                for (const [cartName, defaultManagers] of Object.entries(DEFAULT_VENUE_MANAGERS)) {
                    try {
                        const ref = dbRefs.getDocRef('carts', cartName);
                        const doc = await dbRefs.fb.getDoc(ref);
                        if (!doc.exists()) {
                            report.cartsMissing.push(cartName);
                            continue;
                        }
                        const data = doc.data();
                        const current = Array.isArray(data.managerEmails) ? data.managerEmails.filter(Boolean) : [];
                        if (current.length === 0) {
                            await dbRefs.fb.updateDoc(ref, { managerEmails: defaultManagers });
                            report.cartsUpdated.push(`${cartName} → ${defaultManagers.join(', ')}`);
                        } else {
                            report.cartsSkipped.push(`${cartName}（已有審核者：${current.join(', ')}）`);
                        }
                    } catch (err) {
                        console.error('套用場地失敗', cartName, err);
                        report.cartsFailed.push(`${cartName}（${err.message || err}）`);
                    }
                }

                // 把結果顯示出來
                let lines = ['📋 套用結果\n'];
                lines.push(`【使用者】`);
                if (report.usersAdded.length)  lines.push(`✅ 新增：${report.usersAdded.join(', ')}`);
                if (report.usersExist.length)  lines.push(`ℹ️ 已存在：${report.usersExist.join(', ')}`);
                if (report.usersFailed.length) lines.push(`❌ 失敗：\n${report.usersFailed.join('\n')}`);

                lines.push(`\n【場地審核者】`);
                if (report.cartsUpdated.length) lines.push(`✅ 已指派：\n${report.cartsUpdated.join('\n')}`);
                if (report.cartsSkipped.length) lines.push(`ℹ️ 跳過：\n${report.cartsSkipped.join('\n')}`);
                if (report.cartsMissing.length) lines.push(`⚠️ 場地不存在：${report.cartsMissing.join(', ')}\n（請先建立同名場地，或重新整理觸發 seed）`);
                if (report.cartsFailed.length)  lines.push(`❌ 失敗：\n${report.cartsFailed.join('\n')}`);

                showAlert(lines.join('\n'));
            };

            // 🔧 連線測試：呼叫 GAS 的 ping 端點與 sendTestEmail 端點
            const handleTestEmailConnection = async () => {
                showAlert("正在測試 GAS 連線...");
                // 1. ping 測試（不寄信，只確認連線與 secret 正確）
                const pingResult = await callGAS('ping', {}, true);
                if (!pingResult || !pingResult.ok) return;

                // 2. 真的寄一封測試信給目前登入者
                showConfirm(
                    `✅ GAS 連線成功！\n\n要寄一封測試信給你 (${currentUser.email}) 嗎？`,
                    async () => {
                        const sendResult = await callGAS('sendTestEmail', { to: currentUser.email }, true);
                        if (sendResult && sendResult.ok) {
                            showAlert(`✅ 測試信已送出！\n\n收件者：${currentUser.email}\n請到 Gmail 收件匣確認（也可能在垃圾信件夾）。`);
                        }
                    }
                );
            };

            // 寄送審核通知信給場地管理員（一個或多個）
            // slots: [{ slotId, week, dayName, periodName, slotDate }]
            // GAS 會根據 slotId 為每筆預約生成「核准 / 退回」一鍵按鈕的 URL
            const getAppBaseLink = () => {
                const configuredUrl = (emailConfig.appUrl || GAS_CONFIG.APP_URL || '').trim();
                if (configuredUrl) return configuredUrl.split('?')[0].replace(/\/+$/,'');
                return `${window.location.origin}${window.location.pathname}`;
            };

            const sendApprovalEmail = async ({ managerEmails, cartName, applicantName, applicantEmail, className, slots }) => {
                const emails = (managerEmails || []).filter(Boolean);
                if (emails.length === 0) return;
                const baseLink = getAppBaseLink();
                await callGAS('sendApprovalNotification', {
                    managerEmails: emails,
                    cartName, applicantName, applicantEmail, className,
                    slots: slots || [],
                    baseLink
                });
            };

            // 寄送審核結果信
            // 收件者規則：申請人 + 該場地所有可登記者 + 該場地所有審核者（包含實際審核的那位）
            const sendReviewResultEmail = async ({ decision, applicantEmail, applicantName, registrantEmails, otherManagerEmails, reviewerName, reviewerEmail, cartName, className, week, dayName, periodName, slotDate }) => {
                const uniqueRegistrants = Array.from(new Set((registrantEmails || []).filter(Boolean).map(e => e.toLowerCase())));
                const allReviewers = [...(otherManagerEmails || []), reviewerEmail].filter(Boolean);
                const uniqueReviewers = Array.from(new Set(allReviewers.map(e => e.toLowerCase())));
                await callGAS('sendReviewResult', {
                    decision, // 'approved' | 'rejected'
                    applicantEmail,
                    applicantName,
                    registrantEmails: uniqueRegistrants,
                    otherManagerEmails: uniqueReviewers,
                    reviewerName: reviewerName || '系統管理員',
                    reviewerEmail: reviewerEmail || '',
                    cartName, className, week, dayName, periodName,
                    slotDate: slotDate || ''
                });
            };

            // 判斷目前使用者是否可登記此場地
            // 規則：
            //  - 超級管理員：永遠可以
            //  - 場地若未指定 registrantEmails（空陣列）：所有已登入使用者皆可預約（向後相容）
            //  - 場地若有指定 registrantEmails：必須在名單中
            const canRegisterCart = useCallback((cartName) => {
                if (isAdmin) return true;
                const info = cartData[cartName];
                if (!info || !currentUser) return false;
                const list = Array.isArray(info.registrantEmails) ? info.registrantEmails.filter(Boolean) : [];
                if (list.length === 0) return true;
                const myEmail = (currentUser.email || '').trim().toLowerCase();
                return list.some(e => (e || '').trim().toLowerCase() === myEmail);
            }, [isAdmin, cartData, currentUser]);

            const handleSlotClick = (dayIdx, periodId, existingBooking, areaId = 'main') => {
                const lock = getLockForSlot(selectedCart, selectedWeek, dayIdx, periodId);
                if (lock) {
                    showAlert(`🔒 此時段已被鎖定\n\n名稱：${lock.name}\n期間：第 ${lock.startWeek} - ${lock.startWeek + lock.weeks - 1} 週`);
                    return;
                }

                const isPastSlot = selectedWeek < currentRealWeek || (selectedWeek === currentRealWeek && dayIdx < currentRealDayIdx);

                const isPastLimit = !isAdmin && (selectedWeek > currentRealWeek + (semesterConfig.maxAdvanceWeeks || 2));
                if (isPastLimit) {
                    showAlert(`⚠️ Booking Limit Exceeded\n\nTo ensure fairness, the system only allows bookings up to ${semesterConfig.maxAdvanceWeeks || 2} week(s) in advance.\nPlease try again closer to your desired date!`);
                    return;
                }

                if (existingBooking) {
                    setBookingModal({ isOpen: true, dayIdx, periodId, areaId, existingBooking, isEditing: false, isBatch: false, isPast: isPastSlot });
                } else {
                    if (isPastSlot && !isAdmin) {
                        showAlert("⚠️ Cannot book slots in the past!");
                        return;
                    }

                    // 檢查登記者權限
                    if (!canRegisterCart(selectedCart)) {
                        showAlert(`🚫 你不在「${selectedCart}」的場地登記者名單中，無法預約此場地。\n如需預約，請洽系統管理員加入登記者名單。`);
                        return;
                    }

                    if (isBatchMode) {
                        const slotId = buildSlotId(selectedWeek, dayIdx, periodId, areaId);
                        setBatchSelection(prev => 
                            prev.some(s => s.slotId === slotId) 
                                ? prev.filter(s => s.slotId !== slotId) 
                                : [...prev, { dayIdx, periodId, areaId, slotId }]
                        );
                    } else {
                        setBookForm({ classType: currentUser.defaultClass, customClass: currentUser.customClass });
                        setBookingModal({ isOpen: true, dayIdx, periodId, areaId, existingBooking: null, isEditing: false, isBatch: false, isPast: false });
                    }
                }
            };

            const executeBookingTransaction = async (slotsToBook, finalClass) => {
                const cartRef = dbRefs.getDocRef('carts', selectedCart);

                // 預約是否需要審核：除了最高管理員之外，所有登記都需要審核。
                // 審核通知固定寄給最高管理員，並加上該場地設定的審核者。
                const cartInfo = cartData[selectedCart] || {};
                const managerEmails = (Array.isArray(cartInfo.managerEmails) ? cartInfo.managerEmails : []).filter(Boolean);
                const applicantEmailLower = (currentUser.email || '').trim().toLowerCase();
                const reviewManagerEmails = Array.from(new Set([SUPER_ADMIN_EMAIL, ...managerEmails]
                    .filter(Boolean)
                    .map(e => String(e).trim().toLowerCase())
                    .filter(e => e && e !== applicantEmailLower)
                ));
                const needsApproval = !isAdmin;
                const initialStatus = needsApproval ? 'pending' : 'approved';

                try {
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";

                        const currentData = cartDoc.data();
                        const currentSchedule = currentData.schedule || {};

                        for (const slot of slotsToBook) {
                            if (getLockForSlot(selectedCart, selectedWeek, slot.dayIdx, slot.periodId)) {
                                throw "SLOT_LOCKED";
                            }
                            if (currentSchedule[slot.slotId]) {
                                throw "SLOT_ALREADY_TAKEN";
                            }
                            currentSchedule[slot.slotId] = {
                                name: currentUser.name, email: currentUser.email, 
                                className: finalClass, ownerEmail: currentUser.email,
                                areaId: slot.areaId || 'main',
                                areaLabel: getSlotAreaLabel(slot.areaId),
                                status: initialStatus,
                                createdAt: Date.now()
                            };
                        }
                        transaction.update(cartRef, { schedule: currentSchedule });
                    });

                    const details = slotsToBook.length === 1 
                        ? `Week ${selectedWeek} ${currentDays[slotsToBook[0].dayIdx]} P${slotsToBook[0].periodId}${getSlotAreaLabel(slotsToBook[0].areaId) ? ` ${getSlotAreaLabel(slotsToBook[0].areaId)}` : ''} (${finalClass}) [${initialStatus}]`
                        : `Batch booked ${slotsToBook.length} slots for Week ${selectedWeek} (${finalClass}) [${initialStatus}]`;
                    
                    addLog("Add Booking", selectedCart, details);
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                    setBatchSelection([]);
                    setIsBatchMode(false);

                    // 🔧 寄信通知最高管理員與該場地審核者（只在 pending 時寄）
                    // 每筆 slot 各自附「核准 / 退回」一鍵按鈕，由 GAS 端的 buildActionUrl() 生成連結
                    if (needsApproval) {
                        sendApprovalEmail({
                            managerEmails: reviewManagerEmails,
                            cartName: selectedCart,
                            applicantName: currentUser.name,
                            applicantEmail: currentUser.email,
                            className: finalClass,
                            slots: slotsToBook.map(slot => {
                                const pinfo = periods.find(p => String(p.id) === String(slot.periodId));
                                return {
                                    slotId: slot.slotId,
                                    week: selectedWeek,
                                    dayName: currentDays[slot.dayIdx],
                                    periodName: `${pinfo ? pinfo.name : `Period ${slot.periodId}`}${getSlotAreaLabel(slot.areaId) ? ` · ${getSlotAreaLabel(slot.areaId)}` : ''}`,
                                    slotDate: getDateForDayIdx(selectedWeek, slot.dayIdx)
                                };
                            })
                        });
                        showAlert(`✅ 預約已送出！\n\n狀態：未審核（等待最高管理員或場地審核者核准）\n審核結果將反映在「My Bookings」頁面，並會以 email 同步通知。`);
                    }
                    
                } catch (error) {
                    if (error === "SLOT_ALREADY_TAKEN") showAlert("慢了一步！你選的時段中，有部分已被別人搶走囉，請重新選擇。");
                    else if (error === "SLOT_LOCKED") showAlert("🔒 你選的時段中包含已被鎖定的格子，無法預約。");
                    else if (error === "CART_NOT_FOUND") showAlert("找不到該設備，可能已被管理員刪除。");
                    else showAlert("預約發生錯誤，請稍後檢查網路連線再試。");
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                }
            };

            const checkConflictsAndSubmit = async () => {
                const finalClass = bookForm.classType === 'Other (Specify)' ? bookForm.customClass : bookForm.classType;
                const slotsToBook = bookingModal.isBatch ? batchSelection : [{
                    dayIdx: bookingModal.dayIdx,
                    periodId: bookingModal.periodId,
                    areaId: bookingModal.areaId || 'main',
                    slotId: buildSlotId(selectedWeek, bookingModal.dayIdx, bookingModal.periodId, bookingModal.areaId || 'main')
                }];
                
                const conflictingSlots = slotsToBook.filter(slot => {
                    return Object.entries(cartData).some(([cName, cData]) => {
                        if (cName === selectedCart || !cData.schedule) return false;
                        return Object.entries(cData.schedule).some(([otherSlotId, info]) =>
                            getBaseSlotId(otherSlotId) === getBaseSlotId(slot.slotId) && info?.className === finalClass
                        );
                    });
                });

                if (conflictingSlots.length > 0) {
                    showConfirm(`[Duplicate Booking Warning]\nClass "${finalClass}" has already reserved other equipment during this time slot.\nAre you sure you want to proceed with this additional booking?`, () => {
                        executeBookingTransaction(slotsToBook, finalClass);
                    });
                } else {
                    executeBookingTransaction(slotsToBook, finalClass);
                }
            };

            // 🔧 審核：通過 / 退回
            // 管理員（系統管理員 或 該場地的 managerEmails 中任一人）才能執行
            const canApproveCart = useCallback((cartName) => {
                if (isAdmin) return true;
                const info = cartData[cartName];
                if (!info || !currentUser) return false;
                const list = Array.isArray(info.managerEmails) ? info.managerEmails : [];
                const myEmail = (currentUser.email || '').trim().toLowerCase();
                return list.some(e => (e || '').trim().toLowerCase() === myEmail);
            }, [isAdmin, cartData, currentUser]);

            const reviewBooking = async (cartName, slotId, decision) => {
                // decision: 'approved' | 'rejected'
                if (!canApproveCart(cartName)) {
                    showAlert("你沒有審核此場地的權限。");
                    return;
                }
                const cartRef = dbRefs.getDocRef('carts', cartName);
                try {
                    let bookingDetail = null;
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";
                        const schedule = cartDoc.data().schedule || {};
                        if (!schedule[slotId]) throw "SLOT_NOT_FOUND";
                        bookingDetail = { ...schedule[slotId] };

                        if (decision === 'approved') {
                            schedule[slotId] = { ...schedule[slotId], status: 'approved', reviewedAt: Date.now(), reviewedBy: currentUser.email };
                            transaction.update(cartRef, { schedule });
                        } else {
                            // 退回直接刪除
                            delete schedule[slotId];
                            transaction.update(cartRef, { schedule });
                        }
                    });

                    const slotParts = parseSlotId(slotId);
                    const detailStr = slotParts ? `W${slotParts.week} ${currentDays[slotParts.dayIdx]} P${slotParts.periodId}${slotParts.areaLabel ? ` ${slotParts.areaLabel}` : ''} (${bookingDetail?.name})` : slotId;
                    addLog(decision === 'approved' ? "Approve Booking" : "Reject Booking", cartName, detailStr);

                    // 🔧 寄結果信：申請人 + 該場地所有可登記者 + 該場地所有審核者
                    if (bookingDetail && slotParts) {
                        const cartInfo = cartData[cartName] || {};
                        const allManagers = Array.from(new Set([SUPER_ADMIN_EMAIL, ...(Array.isArray(cartInfo.managerEmails) ? cartInfo.managerEmails : [])]
                            .filter(Boolean)
                            .map(e => String(e).trim().toLowerCase())
                        ));
                        const allRegistrants = Array.isArray(cartInfo.registrantEmails) ? cartInfo.registrantEmails : [];
                        const week = slotParts.week;
                        const dayIdx = slotParts.dayIdx;
                        const periodId = slotParts.periodId;
                        const periodInfo = periods.find(p => String(p.id) === String(periodId));
                        sendReviewResultEmail({
                            decision,
                            applicantEmail: bookingDetail.ownerEmail || bookingDetail.email,
                            applicantName: bookingDetail.name,
                            registrantEmails: allRegistrants,
                            otherManagerEmails: allManagers,
                            reviewerName: currentUser.name,
                            reviewerEmail: currentUser.email,
                            cartName,
                            className: bookingDetail.className,
                            week,
                            dayName: currentDays[dayIdx],
                            periodName: `${periodInfo ? periodInfo.name : `Period ${periodId}`}${slotParts.areaLabel ? ` · ${slotParts.areaLabel}` : ''}`,
                            slotDate: getDateForDayIdx(week, dayIdx)
                        });
                    }

                    showAlert(decision === 'approved' ? "✅ 已核准此預約，結果已寄信通知申請人。" : "❎ 已退回此預約，結果已寄信通知申請人。");
                } catch (err) {
                    if (err === "SLOT_NOT_FOUND") showAlert("這筆預約已不存在，可能已被取消。");
                    else if (err === "CART_NOT_FOUND") showAlert("找不到該場地。");
                    else { console.error(err); showAlert("審核失敗，請稍後再試。"); }
                }
            };

            // 🔧 從 email 一鍵審核：偵測 URL ?action=approve|reject&cart=X&slot=Y
            // 流程：
            //   1. 使用者點 email 中的「核准 / 退回」按鈕，瀏覽器開啟 https://app/?action=...
            //   2. 若尚未登入，先顯示登入畫面，登入完成後本 effect 自動觸發
            //   3. 確認此使用者是該場地的審核者，跳出 confirm 後執行 reviewBooking
            //   4. 處理完清掉 URL 參數，避免重新整理時又跑一次
            useEffect(() => {
                if (!dbRefs) return;
                if (!currentUser && !isAdmin) return;
                if (window.__urlActionHandled) return;

                const params = new URLSearchParams(window.location.search);
                const action = params.get('action');
                const cart   = params.get('cart');
                const slot   = params.get('slot');
                if (!action || !cart || !slot) return;
                if (action !== 'approve' && action !== 'reject') return;

                window.__urlActionHandled = true;

                const decision = action === 'approve' ? 'approved' : 'rejected';
                const decisionLabel = decision === 'approved' ? '核准' : '退回';

                // 把 URL 參數清掉，避免下次重整又彈一次
                const clearUrl = () => window.history.replaceState({}, '', window.location.pathname);

                if (!canApproveCart(cart)) {
                    showAlert(`🚫 你不是「${cart}」的場地審核者，無法執行此操作。\n如有需要請聯絡系統管理員調整審核者名單。`);
                    clearUrl();
                    return;
                }

                showConfirm(
                    `📬 從 email 連結進入審核\n\n場地：${cart}\n動作：${decisionLabel}\n\n確認執行嗎？`,
                    async () => {
                        await reviewBooking(cart, slot, decision);
                        clearUrl();
                    }
                );
            }, [dbRefs, currentUser, isAdmin, canApproveCart]);

            // 計算「等待我審核」的清單（給管理者用）
            const pendingForMe = useMemo(() => {
                if (!currentUser && !isAdmin) return [];
                const result = [];
                Object.entries(cartData).forEach(([cartName, data]) => {
                    if (!canApproveCart(cartName)) return;
                    const sch = data.schedule || {};
                    Object.entries(sch).forEach(([slotId, info]) => {
                        if (info.status === 'pending') {
                            const slotParts = parseSlotId(slotId);
                            if (slotParts) {
                                result.push({
                                    cartName, slotId, info,
                                    week: slotParts.week, dayIdx: slotParts.dayIdx, periodId: slotParts.periodId,
                                    areaId: slotParts.areaId, areaLabel: slotParts.areaLabel
                                });
                            }
                        }
                    });
                });
                result.sort((a, b) => {
                    if (a.week !== b.week) return a.week - b.week;
                    if (a.dayIdx !== b.dayIdx) return a.dayIdx - b.dayIdx;
                    return periods.findIndex(p => p.id == a.periodId) - periods.findIndex(p => p.id == b.periodId);
                });
                return result;
            }, [cartData, currentUser, isAdmin, canApproveCart]);


            // 原本用 updateDoc + deleteField，如果 Admin 同時在編輯同一筆預約，
            // 可能產生 Race Condition。改用 Transaction 確保讀寫原子性，並在預約
            // 已被取消時給予明確的錯誤訊息而不是靜默失敗。
            // =================================================================
            const cancelBooking = async () => {
                const slotId = buildSlotId(selectedWeek, bookingModal.dayIdx, bookingModal.periodId, bookingModal.areaId || bookingModal.existingBooking?.areaId || 'main');
                const cartRef = dbRefs.getDocRef('carts', selectedCart);
                
                try {
                    let cancelledName = '';
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";
                        
                        const currentSchedule = cartDoc.data().schedule || {};
                        if (!currentSchedule[slotId]) throw "ALREADY_CANCELLED";
                        
                        // 非管理員只能取消自己的預約
                        if (!isAdmin && currentSchedule[slotId].ownerEmail !== currentUser.email) {
                            throw "NOT_OWNER";
                        }
                        
                        cancelledName = currentSchedule[slotId].name;
                        delete currentSchedule[slotId];
                        transaction.update(cartRef, { schedule: currentSchedule });
                    });

                    const actionName = isAdmin ? "Force Cancel" : "Cancel Booking";
                    const areaLabel = getSlotAreaLabel(bookingModal.areaId || bookingModal.existingBooking?.areaId);
                    addLog(actionName, selectedCart, `Week ${selectedWeek} ${currentDays[bookingModal.dayIdx]} P${bookingModal.periodId}${areaLabel ? ` ${areaLabel}` : ''} (${cancelledName})`);
                } catch (error) {
                    if (error === "ALREADY_CANCELLED") showAlert("這筆預約已經被取消了。");
                    else if (error === "NOT_OWNER") showAlert("你只能取消自己的預約。");
                    else if (error === "CART_NOT_FOUND") showAlert("找不到該設備。");
                    else showAlert("取消失敗，請稍後再試。");
                }
                
                setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
            };

            const handleEditClick = () => {
                const existing = bookingModal.existingBooking;
                const isStandardClass = classOptions.includes(existing.className);
                setEditBookForm({
                    name: existing.name, email: existing.email,
                    classType: isStandardClass ? existing.className : 'Other (Specify)',
                    customClass: isStandardClass ? '' : existing.className
                });
                setBookingModal(prev => ({ ...prev, isEditing: true }));
            };

            const updateBooking = async () => {
                const slotId = buildSlotId(selectedWeek, bookingModal.dayIdx, bookingModal.periodId, bookingModal.areaId || bookingModal.existingBooking?.areaId || 'main');
                const finalClass = editBookForm.classType === 'Other (Specify)' ? editBookForm.customClass : editBookForm.classType;
                const cartRef = dbRefs.getDocRef('carts', selectedCart);
                
                try {
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";

                        const currentData = cartDoc.data();
                        const currentSchedule = currentData.schedule || {};

                        if (!currentSchedule[slotId]) {
                            throw "SLOT_NOT_FOUND"; 
                        }
                        
                        currentSchedule[slotId] = { 
                            ...currentSchedule[slotId],
                            name: editBookForm.name, 
                            email: editBookForm.email, 
                            className: finalClass, 
                            ownerEmail: editBookForm.email 
                        };
                        
                        transaction.update(cartRef, { schedule: currentSchedule });
                    });

                    addLog("Admin Edit", selectedCart, `Week ${selectedWeek} ${currentDays[bookingModal.dayIdx]} P${bookingModal.periodId} (Updated: ${editBookForm.name})`);
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                } catch (error) {
                    if (error === "SLOT_NOT_FOUND") showAlert("這筆預約似乎已經被使用者手動取消了！請重新確認設備狀態。");
                    else if (error === "CART_NOT_FOUND") showAlert("找不到該設備。");
                    else showAlert("更新失敗，請稍後再試。");
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                }
            };

            const saveCartEdit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const oldName = editCartModal.cartName;
                const newName = formData.get('name').trim();
                const managerEmails = (editCartManagers || []).filter(Boolean);
                const registrantEmails = (editCartRegistrants || []).filter(Boolean);

                // 確保「場地登記者」與「場地審核者」是不同的人
                const overlap = managerEmails.filter(e => registrantEmails.includes(e));
                if (overlap.length > 0) {
                    showAlert(`同一人不能同時擔任「場地登記者」與「場地審核者」：\n${overlap.join('、')}\n\n請重新調整。`);
                    return;
                }

                try {
                    if (oldName && oldName === newName) {
                        await dbRefs.fb.updateDoc(dbRefs.getDocRef('carts', newName), {
                            type: formData.get('type'),
                            location: formData.get('location'),
                            capacity: parseInt(formData.get('capacity')),
                            notes: formData.get('notes'),
                            managerEmails,
                            registrantEmails
                        });
                    } else if (oldName && oldName !== newName) {
                        await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                            const oldDocRef = dbRefs.getDocRef('carts', oldName);
                            const newDocRef = dbRefs.getDocRef('carts', newName);
                            const oldDoc = await transaction.get(oldDocRef);

                            if (!oldDoc.exists()) throw "CART_NOT_FOUND";

                            const latestData = oldDoc.data();
                            const newData = {
                                ...latestData,
                                type: formData.get('type'),
                                location: formData.get('location'),
                                capacity: parseInt(formData.get('capacity')),
                                notes: formData.get('notes'),
                                managerEmails,
                                registrantEmails
                            };

                            transaction.set(newDocRef, newData);
                            transaction.delete(oldDocRef);
                        });
                    } else {
                        const newData = {
                            type: formData.get('type'), location: formData.get('location'), capacity: parseInt(formData.get('capacity')), notes: formData.get('notes'),
                            managerEmails,
                            registrantEmails,
                            schedule: {},
                            order: Object.keys(cartData).length
                        };
                        await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', newName), newData);
                    }

                    addLog(oldName ? "Edit Equipment" : "Add Equipment", "System", `Equipment: ${newName}（審核者：${managerEmails.length} 人，登記者：${registrantEmails.length} 人）`);
                    setEditCartModal({ isOpen: false, cartName: null, data: null });
                    setEditCartManagers([]);
                    setEditCartRegistrants([]);
                } catch (err) {
                    console.error("Save cart error:", err);
                    if (err === "CART_NOT_FOUND") showAlert("The cart you are trying to edit was not found or was deleted.");
                    else showAlert("Failed to save equipment. Please try again.");
                }
            };

            const deleteCart = (name) => {
                showConfirm(`Delete "${name}"?\nThis clears all its bookings.`, async () => {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('carts', name));
                    addLog("Delete Equipment", "System", `Equipment: ${name}`);
                    if (selectedCart === name) setSelectedCart(null);
                });
            };

            // =================================================================
            // 🔧 FIX [效能]: getMyBookings 改用 useMemo 快取
            // 原本每次 render 都重新遍歷所有 cart 的所有 schedule entries。
            // 現在只在 cartData 或 currentUser 變更時才重算。
            // =================================================================
            const allMyBookings = useMemo(() => {
                const myBookings = [];
                if (!currentUser) return myBookings;
                
                Object.entries(cartData).forEach(([cartName, data]) => {
                    if (data.schedule) {
                        Object.entries(data.schedule).forEach(([slotId, bookingInfo]) => {
                            if (bookingInfo.ownerEmail === currentUser.email) {
                                const slotParts = parseSlotId(slotId);
                                if (slotParts) {
                                    myBookings.push({
                                        cartName,
                                        week: slotParts.week,
                                        dayIdx: slotParts.dayIdx,
                                        periodId: slotParts.periodId,
                                        areaId: slotParts.areaId,
                                        areaLabel: slotParts.areaLabel,
                                        slotId,
                                        className: bookingInfo.className,
                                        status: bookingInfo.status || 'approved'
                                    });
                                }
                            }
                        });
                    }
                });

                myBookings.sort((a, b) => {
                    if (a.week !== b.week) return a.week - b.week;
                    if (a.dayIdx !== b.dayIdx) return a.dayIdx - b.dayIdx;
                    return periods.findIndex(p => p.id == a.periodId) - periods.findIndex(p => p.id == b.periodId);
                });
                return myBookings;
            }, [cartData, currentUser]);

            // 🔧 FIX [衝突]: cancelBookingFromList 也改用 runTransaction
            const cancelBookingFromList = (cartName, slotId, className) => {
                showConfirm(`Are you sure you want to cancel this booking for ${cartName}?`, async () => {
                    const cartRef = dbRefs.getDocRef('carts', cartName);
                    
                    try {
                        await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                            const cartDoc = await transaction.get(cartRef);
                            if (!cartDoc.exists()) throw "CART_NOT_FOUND";
                            
                            const currentSchedule = cartDoc.data().schedule || {};
                            if (!currentSchedule[slotId]) throw "ALREADY_CANCELLED";
                            
                            if (!isAdmin && currentSchedule[slotId].ownerEmail !== currentUser.email) {
                                throw "NOT_OWNER";
                            }
                            
                            delete currentSchedule[slotId];
                            transaction.update(cartRef, { schedule: currentSchedule });
                        });
                        
                        const slotParts = parseSlotId(slotId);
                        if (slotParts) addLog("Cancel Booking", cartName, `W${slotParts.week} ${currentDays[slotParts.dayIdx]} P${slotParts.periodId}${slotParts.areaLabel ? ` ${slotParts.areaLabel}` : ''} (${className})`);
                    } catch (error) {
                        if (error === "ALREADY_CANCELLED") showAlert("這筆預約已經被取消了。");
                        else if (error === "NOT_OWNER") showAlert("你只能取消自己的預約。");
                        else if (error === "CART_NOT_FOUND") showAlert("找不到該設備。");
                        else showAlert("取消失敗，請稍後再試。");
                    }
                });
            };

            const upcomingBookings = useMemo(() =>
                allMyBookings.filter(b => b.week > currentRealWeek || (b.week === currentRealWeek && b.dayIdx >= currentRealDayIdx)),
                [allMyBookings, currentRealWeek, currentRealDayIdx]
            );
            const historyBookings = useMemo(() =>
                allMyBookings.filter(b => b.week < currentRealWeek || (b.week === currentRealWeek && b.dayIdx < currentRealDayIdx)),
                [allMyBookings, currentRealWeek, currentRealDayIdx]
            );
            const baseDisplayedBookings = myBookingsTab === 'upcoming' ? upcomingBookings : historyBookings;
            const pendingDisplayedCount = baseDisplayedBookings.filter(b => b.status === 'pending').length;
            const approvedDisplayedCount = baseDisplayedBookings.filter(b => b.status !== 'pending').length;
            const displayedBookings = myBookingsStatusTab === 'pending'
                ? baseDisplayedBookings.filter(b => b.status === 'pending')
                : myBookingsStatusTab === 'approved'
                    ? baseDisplayedBookings.filter(b => b.status !== 'pending')
                    : baseDisplayedBookings;

            if (firebaseReady === 'auth-error') {
                return (
                    <div className="min-h-screen bg-duo-grayLight flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-[2rem] border-2 border-duo-grayBorder shadow-[0_8px_0_0_#e5e5e5] max-w-lg text-center">
                            <i className="fa-solid fa-triangle-exclamation text-duo-red text-6xl mb-4"></i>
                            <h2 className="text-2xl font-extrabold text-duo-text mb-4">Firebase Setup Incomplete</h2>
                            <p className="text-duo-text/80 mb-6 text-left leading-relaxed font-bold">
                                Authentication is not properly configured in your Firebase console.<br/><br/>
                                <span className="text-duo-blue uppercase tracking-wider text-sm">How to fix:</span><br/>
                                1. Go to Firebase Console -> <strong>Authentication</strong>.<br/>
                                2. Click <strong>Sign-in method</strong>.<br/>
                                3. Enable <strong>Google</strong> provider.<br/>
                                4. Save and refresh this page.
                            </p>
                            <button onClick={() => window.location.reload()} className="w-full bg-duo-green text-white font-extrabold uppercase py-4 rounded-2xl shadow-[0_4px_0_0_#58a700] active:shadow-none active:translate-y-[4px] transition-all tracking-wider">
                                Refresh Page
                            </button>
                        </div>
                    </div>
                );
            }

            if (!firebaseReady) {
                return (
                    <div className="min-h-screen bg-duo-grayLight flex flex-col items-center justify-center">
                        <i className="fa-solid fa-spinner fa-spin text-duo-green text-6xl mb-6"></i>
                        <h2 className="text-2xl font-extrabold text-duo-text tracking-wide">Loading...</h2>
                    </div>
                );
            }

            if (!currentUser && !isAdmin) {
                return (
                    <div className="min-h-screen bg-duo-grayLight flex items-center justify-center p-4 relative overflow-hidden">
                        <i className="fa-solid fa-dumbbell text-duo-blue/10 text-[20rem] absolute -top-20 -left-20 -rotate-12 pointer-events-none"></i>
                        <i className="fa-solid fa-person-running text-duo-green/10 text-[15rem] absolute -bottom-10 -right-10 rotate-12 pointer-events-none"></i>
                        
                        <div className="w-full max-w-md relative z-10">
                            <div className="text-center mb-8">
                                {/* 🏀 運動風 logo：籃球 + 啞鈴雙圖示 */}
                                <div className="inline-flex items-center justify-center bg-white p-5 rounded-3xl border-2 border-duo-grayBorder shadow-[0_6px_0_0_#e5e5e5] mb-5 gap-3">
                                    <i className="fa-solid fa-basketball text-duo-yellow text-5xl drop-shadow-sm"></i>
                                    <i className="fa-solid fa-dumbbell text-duo-green text-5xl drop-shadow-sm"></i>
                                    <i className="fa-solid fa-person-running text-duo-blue text-5xl drop-shadow-sm"></i>
                                </div>
                                <h1 className="text-3xl font-extrabold text-duo-text tracking-tight">室內運動場地登記表</h1>
                                <p className="text-duo-text/60 font-bold mt-2 text-lg">Indoor Sports Venue Reservation</p>
                            </div>

                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-[0_8px_0_0_#e5e5e5] p-8">
                                <div className="space-y-4">
                                    <div className="text-center">
                                        <p className="text-sm font-bold text-gray-500 mb-6">
                                            {useEmailOnlyLogin
                                                ? '預覽 / 本機環境，請按下方登入按鈕。'
                                                : '請使用授權的 Google 帳號登入。'}
                                        </p>

                                        {/* Google 登入按鈕（預覽環境會自動 fallback 為 email prompt） */}
                                        <button onClick={handleGoogleLogin} className="w-full bg-white text-duo-text border-2 border-duo-grayBorder font-extrabold uppercase py-4 rounded-2xl shadow-[0_4px_0_0_#e5e5e5] hover:bg-gray-50 hover:border-gray-300 active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-lg flex items-center justify-center">
                                            {useEmailOnlyLogin ? (
                                                <i className="fa-solid fa-right-to-bracket text-duo-blue text-xl mr-3"></i>
                                            ) : (
                                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-6 h-6 mr-3" />
                                            )}
                                            {useEmailOnlyLogin ? '登入' : 'Sign in with Google'}
                                        </button>

                                        {useEmailOnlyLogin && (
                                            <div className="mt-4 p-3 bg-yellow-50 border-2 border-duo-yellow rounded-xl text-left">
                                                <p className="text-[11px] font-bold text-duo-yellowDark leading-relaxed">
                                                    <i className="fa-solid fa-info-circle mr-1"></i>
                                                    偵測到目前環境為 <span className="font-extrabold">{_proto || 'preview'}</span>，
                                                    Firebase 的 Google OAuth 在此環境下無法運作。<br/>
                                                    按上方登入按鈕後，請輸入白名單帳號。
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="text-center mt-4 pt-4 border-t-2 border-duo-grayBorder">
                                        <p className="text-xs font-bold text-gray-400">超級管理員帳號自動授權，其他帳號需先加入白名單。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#ffffff]">
                    <header className="bg-white border-b-2 border-duo-grayBorder sticky top-0 z-50 no-print">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center space-x-3 cursor-pointer group" onClick={goHome}>
                                <i className="fa-solid fa-dumbbell text-duo-green text-3xl group-hover:scale-110 transition-transform"></i>
                                <h1 className="text-2xl font-extrabold text-duo-green tracking-tight hidden sm:block">室內運動場地登記表</h1>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <button onClick={() => changeView('print')} className="px-4 py-2.5 bg-white border-2 border-duo-grayBorder text-gray-400 font-extrabold uppercase tracking-wider rounded-2xl shadow-[0_4px_0_0_#e5e5e5] hover:bg-gray-50 active:shadow-none active:translate-y-[4px] transition-all text-xs sm:text-sm">
                                    <i className="fa-solid fa-print sm:mr-1"></i> <span className="hidden sm:inline">Print</span>
                                </button>

                                <button onClick={() => changeView('my-bookings')} className={`px-4 py-2.5 font-extrabold uppercase tracking-wider rounded-2xl transition-all text-xs sm:text-sm ${currentView === 'my-bookings' ? 'bg-duo-blue text-white shadow-[0_4px_0_0_#1899d6] active:shadow-none active:translate-y-[4px]' : 'bg-white border-2 border-duo-grayBorder text-duo-blue shadow-[0_4px_0_0_#e5e5e5] hover:bg-blue-50 active:shadow-none active:translate-y-[4px]'}`}>
                                    <i className="fa-solid fa-calendar-check sm:mr-1"></i> <span className="hidden sm:inline">My Bookings</span>
                                </button>

                                {isAdmin && (
                                    <button onClick={() => { changeView('admin'); setAdminTab('carts'); }} className={`px-4 py-2.5 font-extrabold uppercase tracking-wider rounded-2xl transition-all text-xs sm:text-sm ${currentView === 'admin' ? 'bg-duo-text text-white shadow-[0_4px_0_0_#2b2b2b] active:shadow-none active:translate-y-[4px]' : 'bg-white border-2 border-duo-grayBorder text-duo-text shadow-[0_4px_0_0_#e5e5e5] hover:bg-gray-50 active:shadow-none active:translate-y-[4px]'}`}>
                                        <i className="fa-solid fa-gear sm:mr-1"></i> <span className="hidden sm:inline">Admin</span>
                                    </button>
                                )}
                                
                                <div className="flex items-center ml-2 border-2 border-duo-grayBorder rounded-2xl h-[44px] overflow-hidden bg-duo-grayLight">
                                    <div className="px-4 font-extrabold text-duo-blue text-sm flex items-center h-full max-w-[120px] truncate">
                                        <i className={`fa-solid ${isAdmin ? 'fa-shield-halved text-duo-yellow' : 'fa-user'} mr-2`}></i>
                                        {currentUser.name}
                                    </div>
                                    <button onClick={async () => { await dbRefs.fb.signOut(dbRefs.auth); setCurrentUser(null); setIsAdmin(false); setCartData({}); setActivityLogs([]); setUsersDB({}); }} className="px-3 h-full border-l-2 border-duo-grayBorder text-gray-400 hover:text-duo-red hover:bg-red-50 transition-colors" title="Log Out">
                                        <i className="fa-solid fa-right-from-bracket"></i>
                                    </button>
                                </div>
                            </div>

                                            未選 = 預約申請會寄給最高管理員審核。<br/>
                                            選擇後，預約申請會寄給最高管理員與所有指定審核者，任一人核准即可；通過後會 email 通知登記者與審核者。<br/>
                                            <span className="text-duo-yellowDark">ℹ️ 名單只列出角色為「場地審核者」或「超級管理員」，且未在登記者名單中的使用者。</span>
                                        </p>
                                    </div>
                                    <div><label className="block text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-1">備註 (選填)</label><textarea name="notes" defaultValue={editCartModal.data?.notes || ''} placeholder="例如：使用前請閱讀器材安全須知" rows="2" className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold resize-none" /></div>
                                    <div className="flex gap-4 pt-4 border-t-2 border-duo-grayBorder">
                                        <button type="button" onClick={() => { setEditCartModal({ isOpen: false, cartName: null, data: null }); setEditCartManagers([]); setEditCartRegistrants([]); }} className="flex-1 bg-white border-2 border-duo-grayBorder text-gray-400 font-extrabold uppercase py-3 rounded-2xl shadow-duo-gray active:shadow-none active:translate-y-[4px] transition-all">取消</button>
                                        <button type="submit" className="flex-[2] bg-duo-green text-white font-extrabold uppercase py-3 rounded-2xl shadow-duo-green active:shadow-none active:translate-y-[4px] transition-all">儲存</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {lockModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[60] overflow-y-auto no-print backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-2xl w-full max-w-lg my-8 animate-[fadeIn_0.15s_ease-out] overflow-hidden">
                                <div className="p-6 border-b-2 border-duo-grayBorder bg-duo-grayLight flex justify-between items-center">
                                    <h3 className="font-extrabold text-xl text-duo-text"><i className="fa-solid fa-lock text-duo-red mr-2"></i>{lockModal.lockId ? '編輯鎖定' : '新增鎖定'}</h3>
                                    <button onClick={() => setLockModal({ isOpen: false, lockId: null, data: null })} className="w-8 h-8 bg-white border-2 border-duo-grayBorder rounded-full text-gray-400 hover:text-duo-text transition-colors flex items-center justify-center"><i className="fa-solid fa-times"></i></button>
                                </div>
                                <form onSubmit={saveLock} className="p-6 space-y-5">
                                    <div>
                                        <label className="block text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-1">名稱</label>
                                        <input required name="name" defaultValue={lockModal.data?.name || ''} placeholder="例如：校務會議" className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-1">Cart</label>
                                        <select required name="cartName" defaultValue={lockModal.data?.cartName || ''} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold">
                                            <option value="">-- 請選擇 --</option>
                                            {sortedAllCarts.map(([name]) => <option key={name} value={name}>{name}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-1">星期</label>
                                            <select required name="dayIdx" defaultValue={lockModal.data?.dayIdx ?? 0} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold">
                                                {currentDays.map((d, i) => <option key={d} value={i}>{d}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-1">節次</label>
                                            <select required name="periodId" defaultValue={lockModal.data?.periodId ?? 1} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold">
                                                {periods.filter(p => p.id !== 'lunch').map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-1">起始週</label>
                                            <input required type="number" name="startWeek" min="1" max={semesterConfig.totalWeeks} defaultValue={lockModal.data?.startWeek || currentRealWeek || 1} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-extrabold text-gray-400 uppercase tracking-wider mb-1">持續幾週</label>
                                            <input required type="number" name="weeks" min="1" max={semesterConfig.totalWeeks} defaultValue={lockModal.data?.weeks || 1} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold" />
                                        </div>
                                    </div>
                                    <div className="bg-red-50 border-2 border-red-100 rounded-xl p-3 text-xs font-bold text-duo-red">
                                        <i className="fa-solid fa-triangle-exclamation mr-1"></i> 儲存後，該時段內現有的預約將被覆蓋移除。
                                    </div>
                                    <div className="flex gap-4 pt-4 border-t-2 border-duo-grayBorder">
                                        <button type="button" onClick={() => setLockModal({ isOpen: false, lockId: null, data: null })} className="flex-1 bg-white border-2 border-duo-grayBorder text-gray-400 font-extrabold uppercase py-3 rounded-2xl shadow-duo-gray active:shadow-none active:translate-y-[4px] transition-all">取消</button>
                                        <button type="submit" className="flex-[2] bg-duo-green text-white font-extrabold uppercase py-3 rounded-2xl shadow-duo-green active:shadow-none active:translate-y-[4px] transition-all">儲存</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {alertModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[70] backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-2xl max-w-xs w-full p-8 text-center animate-[bounceIn_0.3s_cubic-bezier(0.175,0.885,0.32,1.275)]">
                                <div className="w-20 h-20 bg-blue-50 text-duo-blue rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm">
                                    <i className="fa-solid fa-bell text-4xl"></i>
                                </div>
                                <p className="text-duo-text font-bold mb-8 whitespace-pre-line text-lg leading-relaxed">{alertModal.message}</p>
                                <button onClick={() => setAlertModal({ isOpen: false, message: '' })} className="w-full bg-duo-blue text-white font-extrabold uppercase py-4 rounded-2xl shadow-duo-blue active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-lg">Got it!</button>
                            </div>
                        </div>
                    )}

                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[70] backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-2xl max-w-sm w-full p-8 text-center animate-[bounceIn_0.3s_cubic-bezier(0.175,0.885,0.32,1.275)]">
                                <div className="w-20 h-20 bg-red-50 text-duo-red rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm">
                                    <i className="fa-solid fa-triangle-exclamation text-4xl"></i>
                                </div>
                                <p className="text-duo-text font-bold mb-8 whitespace-pre-line text-lg leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setConfirmModal({ isOpen: false, message: '', onConfirm: null })} className="flex-1 bg-white border-2 border-duo-grayBorder text-gray-400 font-extrabold uppercase py-4 rounded-2xl shadow-duo-gray active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-sm">Cancel</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ isOpen: false, message: '', onConfirm: null }); }} className="flex-1 bg-duo-red text-white font-extrabold uppercase py-4 rounded-2xl shadow-duo-red active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-sm">Confirm</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <style>{`
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
                    `}</style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
